name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install linters
        run: pip install ruff mypy

      - name: ruff (style + error rules)
        run: ruff check . --select E,F,W,I --ignore E501

      - name: mypy (type checking)
        run: mypy . --ignore-missing-imports --exclude 'tests/'
        continue-on-error: true
        # continue-on-error until type annotations are added;
        # flip to false once the codebase is annotated.

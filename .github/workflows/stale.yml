name: Stale

on:
  schedule:
    - cron: '0 8 * * 1'  # every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days.
            It will be closed in 7 days unless there is new activity.
          stale-pr-message: >
            This pull request has been inactive for 30 days.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: 'Closing due to inactivity. Reopen if still relevant.'
          close-pr-message: 'Closing due to inactivity. Reopen if still relevant.'
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'

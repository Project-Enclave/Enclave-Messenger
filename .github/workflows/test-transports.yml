name: Transport Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-timeout

      - name: Create transport test stubs
        run: |
          mkdir -p tests
          cat > tests/__init__.py << 'EOF'
          EOF
          cat > tests/test_transports.py << 'EOF'
          """
          Transport layer tests.
          Hardware transports (Bluetooth, LoRa) are mocked.
          LAN discovery is tested with loopback sockets.
          """
          import socket
          import threading
          import time
          import sys
          import os
          import pytest

          sys.path.insert(0, os.path.dirname(os.path.dirname(os.path.abspath(__file__))))


          class TestLANDiscovery:
              """Test LAN peer discovery using loopback."""

              def test_udp_broadcast_loopback(self):
                  """Verify UDP broadcast socket can send and receive on loopback."""
                  received = []
                  port = 47823

                  def listener():
                      sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
                      sock.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                      sock.bind(('127.0.0.1', port))
                      sock.settimeout(2.0)
                      try:
                          data, _ = sock.recvfrom(1024)
                          received.append(data)
                      except socket.timeout:
                          pass
                      finally:
                          sock.close()

                  t = threading.Thread(target=listener, daemon=True)
                  t.start()
                  time.sleep(0.1)

                  sender = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
                  sender.sendto(b'ENCLAVE_DISCOVER', ('127.0.0.1', port))
                  sender.close()

                  t.join(timeout=3)
                  assert received == [b'ENCLAVE_DISCOVER']

              def test_tcp_peer_connection(self):
                  """Verify two loopback sockets can connect and exchange a ping."""
                  port = 47824
                  result = []

                  def server():
                      srv = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      srv.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
                      srv.bind(('127.0.0.1', port))
                      srv.listen(1)
                      srv.settimeout(3)
                      try:
                          conn, _ = srv.accept()
                          data = conn.recv(64)
                          conn.sendall(b'PONG')
                          conn.close()
                          result.append(data)
                      except socket.timeout:
                          pass
                      finally:
                          srv.close()

                  t = threading.Thread(target=server, daemon=True)
                  t.start()
                  time.sleep(0.1)

                  client = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  client.connect(('127.0.0.1', port))
                  client.sendall(b'PING')
                  reply = client.recv(64)
                  client.close()

                  t.join(timeout=4)
                  assert result == [b'PING']
                  assert reply == b'PONG'


          class TestBluetoothTransportMock:
              """Bluetooth hardware is unavailable in CI — test the interface contract."""

              def test_mock_bt_send_returns_bytes(self):
                  """BT transport send() must return bytes."""
                  class MockBTTransport:
                      def send(self, data: bytes) -> bytes:
                          assert isinstance(data, bytes)
                          return b'ACK:' + data[:4]

                  bt = MockBTTransport()
                  result = bt.send(b'HELLO')
                  assert isinstance(result, bytes)
                  assert result.startswith(b'ACK:')

              def test_mock_bt_unavailable_raises(self):
                  """BT transport must raise RuntimeError when adapter is absent."""
                  class MockBTTransport:
                      def send(self, data: bytes):
                          raise RuntimeError('no bluetooth adapter')

                  bt = MockBTTransport()
                  with pytest.raises(RuntimeError, match='no bluetooth adapter'):
                      bt.send(b'TEST')


          class TestSMSGatewayMock:
              """SMS gateway tests against a mock HTTP server."""

              def test_mock_sms_send_payload(self):
                  """SMS transport must form a valid JSON payload."""
                  import json

                  class MockSMSTransport:
                      def __init__(self):
                          self.last_payload = None

                      def send(self, to: str, body: str) -> dict:
                          self.last_payload = {'to': to, 'body': body}
                          return {'status': 'queued', 'to': to}

                  sms = MockSMSTransport()
                  result = sms.send('+919876543210', 'hello enclave')
                  assert result['status'] == 'queued'
                  assert sms.last_payload['to'] == '+919876543210'
                  payload_json = json.dumps(sms.last_payload)
                  parsed = json.loads(payload_json)
                  assert parsed['body'] == 'hello enclave'

              def test_sms_phone_number_validation(self):
                  """Phone numbers must start with + and contain 7-15 digits."""
                  import re
                  pattern = re.compile(r'^\+?[0-9]{7,15}$')
                  assert pattern.match('+919876543210')
                  assert pattern.match('+12025551234')
                  assert not pattern.match('not-a-number')
                  assert not pattern.match('+1')
          EOF

      - name: Run transport tests
        run: pytest tests/test_transports.py -v --timeout=10

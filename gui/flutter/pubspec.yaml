name: enclave_messenger
description: Enclave Messenger — Flutter GUI for Android and Desktop
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # state management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # networking / websockets
  web_socket_channel: ^2.4.0
  http: ^1.2.1

  # secure local storage
  flutter_secure_storage: ^9.0.0

  # routing
  go_router: ^13.2.0

  # utilities
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
